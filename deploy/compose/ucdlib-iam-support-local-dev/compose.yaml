x-variables:
  main-image: &main-image localhost/local-dev/ucdlib-iam-support:local-dev
services:
  app:
    image: *main-image
    env_file:
      - .env
    ports:
      - ${UCDLIB_APP_HOST_PORT:-3000}:3000
    depends_on:
      - db
    environment:
      UCDLIB_APP_ENV: ${UCDLIB_APP_ENV:-dev}
      UCDLIB_RT_QUEUE: ${UCDLIB_RT_QUEUE:-test}
      UCDLIB_RT_FACILITIES_QUEUE: ${UCDLIB_RT_FACILITIES_QUEUE:-test}
      UCDLIB_BASE_URL: ${UCDLIB_BASE_URL:-http://localhost:3000}
      UCDLIB_RT_FORBID_WRITE: ${UCDLIB_RT_FORBID_WRITE:-true}
      APP_REPORT_ERRORS_URL: https://client-error-reporter-akwemh35fa-uw.a.run.app
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPASSWORD: 'localhost'
      PGPORT: 5432
      BACKUP_LOG_TABLE: ${BACKUP_LOG_TABLE:-backup_log}
      KEYCLOAK_ADMIN_BASE_URL: ${KEYCLOAK_ADMIN_BASE_URL:-https://sandbox.auth.library.ucdavis.edu}
    volumes:
      - ../../../services:/services
      - /services/node_modules
    # command: ["npm", "run", "start-client"]
  cli:
    image: *main-image
    env_file:
      - .env
    depends_on:
      - db
    environment:
      UCDLIB_APP_ENV: ${UCDLIB_APP_ENV:-dev}
      UCDLIB_RT_FORBID_WRITE: ${UCDLIB_RT_FORBID_WRITE:-true}
      UCDLIB_RT_QUEUE: ${UCDLIB_RT_QUEUE:-test}
      UCDLIB_RT_FACILITIES_QUEUE: ${UCDLIB_RT_FACILITIES_QUEUE:-test}
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPASSWORD: 'localhost'
      PGPORT: 5432
      KEYCLOAK_ADMIN_BASE_URL: ${KEYCLOAK_ADMIN_BASE_URL:-https://sandbox.auth.library.ucdavis.edu}
    volumes:
      - ../../../services:/services
      - /services/node_modules
  api:
    image: *main-image
    env_file:
      - .env
    ports:
      - ${UCDLIB_API_HOST_PORT:-3002}:3000
    depends_on:
      - db
    environment:
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPASSWORD: 'localhost'
      PGPORT: 5432
      KEYCLOAK_ADMIN_BASE_URL: ${KEYCLOAK_ADMIN_BASE_URL:-https://sandbox.auth.library.ucdavis.edu}
    # command: ["npm", "run", "start-api"]
    volumes:
      - ../../../services:/services
      - /services/node_modules
  backup:
    image: *main-image
    env_file:
      - .env
    depends_on:
      - db
    environment:
      UCDLIB_APP_ENV: ${UCDLIB_APP_ENV:-dev}
      BACKUP_ENV: ${BACKUP_ENV:-localhost}
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPASSWORD: 'localhost'
      PGPORT: 5432
      GOOGLE_APPLICATION_CREDENTIALS: /etc/service-account.json
      GOOGLE_CLOUD_BUCKET: 'itis-iam'
      SQL_FILE_NAME: 'itis-iam.sql.gz'
      BACKUP_LOG_TABLE: ${BACKUP_LOG_TABLE:-backup_log}
      KEYCLOAK_ADMIN_BASE_URL: ${KEYCLOAK_ADMIN_BASE_URL:-https://sandbox.auth.library.ucdavis.edu}
    # command: /services/backup/entrypoint.sh
    volumes:
      - ../../../services/backup:/services/backup
      - ../../secrets/gc-itis-iam-writer-key.json:/etc/service-account.json
  init:
    image: *main-image
    env_file:
      - .env
    depends_on:
      - db
    environment:
      UCDLIB_APP_ENV: ${UCDLIB_APP_ENV:-dev}
      RUN_INIT: true
      DATA_ENV: 'prod'
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPASSWORD: 'localhost'
      PGPORT: 5432
      GOOGLE_APPLICATION_CREDENTIALS: /etc/service-account.json
      GOOGLE_CLOUD_BUCKET: 'itis-iam'
      SQL_FILE_NAME: 'itis-iam.sql.gz'
      KEYCLOAK_ADMIN_BASE_URL: ${KEYCLOAK_ADMIN_BASE_URL:-https://sandbox.auth.library.ucdavis.edu}
    command: /services/init/init.sh
    volumes:
      - ../../../services/init:/services/init
      - ../../secrets/gc-itis-iam-reader-key.json:/etc/service-account.json
  maintenance:
    image: *main-image
    env_file:
      - .env
    depends_on:
      - db
    environment:
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPASSWORD: 'localhost'
      PGPORT: 5432
      UCDLIB_RT_FORBID_WRITE: ${UCDLIB_RT_FORBID_WRITE:-true}
      UCDLIB_RT_QUEUE: ${UCDLIB_RT_QUEUE:-test}
      UCDLIB_RT_FACILITIES_QUEUE: ${UCDLIB_RT_FACILITIES_QUEUE:-test}
      KEYCLOAK_ADMIN_BASE_URL: ${KEYCLOAK_ADMIN_BASE_URL:-https://sandbox.auth.library.ucdavis.edu}
    # command: /services/maintenance/entrypoint.sh
    volumes:
      - ../../../services:/services
      - /services/node_modules
  db:
    image: postgres:15.3
    environment:
      POSTGRES_PASSWORD: localhost
    volumes:
      - db-data:/var/lib/postgresql/data
      #- ../../deploy/utils/db-entrypoint:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    ports:
      - 8080:8080
volumes:
  db-data:
